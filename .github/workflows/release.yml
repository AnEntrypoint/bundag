name: Build and Release Binaries

on:
  push:
    branches:
      - main

jobs:
  build:
    permissions:
      contents: write
    if: "startsWith(github.event.head_commit.message, 'chore: bump version')"
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: node20-win-x64
            output: bungraph-win-x64.exe
          - os: windows-11-arm
            target: node20-win-arm64
            output: bungraph-win-arm64.exe
          - os: macos-13
            target: node20-macos-x64
            output: bungraph-macos-x64
          - os: macos-latest
            target: node20-macos-arm64
            output: bungraph-macos-arm64
          - os: ubuntu-latest
            target: node20-linux-x64
            output: bungraph-linux-x64
          - os: ubuntu-24.04-arm
            target: node20-linux-arm64
            output: bungraph-linux-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install --no-audit --no-fund

      - name: Build binary
        shell: bash
        run: |
          mkdir -p dist
          npx --yes @yao-pkg/pkg@latest --targets ${{ matrix.target }} --output dist/${{ matrix.output }} bin/bundag.js

      - name: Get version
        id: version
        shell: bash
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: dist/${{ matrix.output }}
          make_latest: true
